name: "🔥 ProxyScraper Pro"

on:
  # Run on schedule (every 6 hours)
  schedule:
    - cron: "0 */6 * * *"

  # Manual trigger with full control
  workflow_dispatch:
    inputs:
      protocols:
        description: "Protocols to scrape (http,https,socks4,socks5)"
        required: false
        default: "http,https,socks4,socks5"
        type: string
      max_timeout:
        description: "Validation timeout in seconds"
        required: false
        default: "10"
        type: string
      max_workers:
        description: "Concurrent validation threads"
        required: false
        default: "300"
        type: string
      validate:
        description: "Enable proxy validation"
        required: false
        default: true
        type: boolean
      country_filter:
        description: "Country codes filter (e.g., US,GB,DE or 'all')"
        required: false
        default: "all"
        type: string
      anonymity_filter:
        description: "Anonymity level (transparent,anonymous,elite,all)"
        required: false
        default: "all"
        type: string
      output_formats:
        description: "Output formats (txt,csv,json)"
        required: false
        default: "txt,csv,json"
        type: string

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  TZ: "UTC"

jobs:
  scrape:
    name: "🌐 Scrape & Validate Proxies"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ─── Checkout ────────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Python Setup ────────────────────────────
      - name: "🐍 Setup Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ─── Cache ───────────────────────────────────
      - name: "📦 Cache pip packages"
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ─── Install Dependencies ───────────────────
      - name: "⚙️ Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── Run Scraper ────────────────────────────
      - name: "🚀 Run ProxyScraper Pro"
        run: |
          python src/scraper.py \
            --protocols "${{ github.event.inputs.protocols || 'http,https,socks4,socks5' }}" \
            --timeout "${{ github.event.inputs.max_timeout || '10' }}" \
            --workers "${{ github.event.inputs.max_workers || '300' }}" \
            --validate "${{ github.event.inputs.validate || 'true' }}" \
            --countries "${{ github.event.inputs.country_filter || 'all' }}" \
            --anonymity "${{ github.event.inputs.anonymity_filter || 'all' }}" \
            --formats "${{ github.event.inputs.output_formats || 'txt,csv,json' }}"
        env:
          PYTHONUNBUFFERED: "1"

      # ─── Generate Report ─────────────────────────
      - name: "📊 Generate Report"
        run: python src/reporter.py

      # ─── Upload Artifacts ────────────────────────
      - name: "📤 Upload Proxy Lists"
        uses: actions/upload-artifact@v4
        with:
          name: proxy-lists-${{ github.run_number }}
          path: output/
          retention-days: 30

      # ─── Commit Results ──────────────────────────
      - name: "💾 Commit & Push Results"
        run: |
          git config --local user.email "proxy-scraper[bot]@github.com"
          git config --local user.name "ProxyScraper Pro [bot]"
          git add output/ || true
          git add README.md || true
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          git diff --cached --quiet || \
            git commit -m "🔄 Proxy update — ${TIMESTAMP}" \
              -m "$(cat output/commit_summary.txt 2>/dev/null || echo 'Auto-update')"
          git push

      # ─── Job Summary ────────────────────────────
      - name: "📋 Job Summary"
        if: always()
        run: |
          if [ -f output/github_summary.md ]; then
            cat output/github_summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ No summary generated" >> $GITHUB_STEP_SUMMARY
          fi
